# Nessus — Data Source Registry
#
# Machine-readable companion to DATA_CATALOG.md (full source universe) and
# DATA_CHECKLIST.md (short build tracker + "Ingestion audit — 2026-06-21").
# Generated 2026-06-21 from a live audit of this working copy's polaris.db,
# scheduler_log, pipeline/ingest.py, pipeline/breadth.py, pipeline/connectors.py,
# and api/scheduler.py — not from documentation claims alone.
#
# IMPORTANT — licensing fields are honest, not aspirational:
#   `license` / `terms_url` are populated where there is a well-established,
#   citable public licence (e.g. open.canada.ca CKAN datasets all publish under
#   the Open Government Licence – Canada). Anywhere this repo has been pulling
#   data WITHOUT a confirmed licence review, `commercial_reuse_reviewed: false`
#   and the relevant fields say `unreviewed` — that is a real gap, not a
#   placeholder to ignore. Per the ingestion spec's own rule ("a source must
#   not be enabled until its access method and reuse conditions have been
#   documented"), several sources below are live in the DB today despite
#   `commercial_reuse_reviewed: false`. That mismatch is flagged deliberately
#   so it gets resolved, not hidden.
#
# Schema per source:
#   id                          stable source id (matches scheduler job_id / connector id where one exists)
#   name                        human label
#   jurisdiction                federal | provincial | municipal | international
#   publisher                   department/agency/site that publishes the data
#   category                    UI/grouping category. Goal 10 (2026-06-22) split what used to be one
#                                undifferentiated `news` bucket into `government_publications` (official
#                                government department/agency RSS+API feeds — pipeline/feeds.py, blanket
#                                Crown-copyright review) and `canadian_news` (actual commercial/independent
#                                news publishers — pipeline/news_feeds.py, each individually licence-reviewed)
#   base_url                    primary access endpoint or dataset landing page
#   access_method               api | rss | ckan | bulk_csv | bulk_zip | sdmx | scrape | third_party_api | key_required
#   license                     citable licence name, or "unreviewed"
#   terms_url                   URL of the terms/licence, or null
#   robots_url                  conventional robots.txt URL for the domain (existence not yet verified for most)
#   commercial_reuse_reviewed   true | false — has anyone actually checked this is OK for Nessus's commercial use?
#   full_text_storage_allowed   true | false | null (null = not applicable, e.g. numeric/structured-only sources)
#   attribution_required        true | false | null
#   enabled                     true | false — is a connector actually wired into the scheduler today?
#   connector                   file:function implementing the fetch, or "none"
#   implementation_status       working | working_incomplete | present_but_broken | wired_not_triggered |
#                                missing | blocked_licensing | blocked_technical | needs_investigation | placeholder
#   backfill_strategy           how the initial/full load happens (or "not designed")
#   incremental_strategy        how repeat runs avoid re-importing everything (or "none — full replace every run")
#   check_frequency             cron cadence as configured today, or proposed cadence if not yet built
#   last_checked                last time the connector ran at all (ok or error), from scheduler_log, or null
#   last_successful_import      last successful run, from scheduler_log, or null
#   last_source_change          last known change at the SOURCE (not our DB) — null everywhere; no source has
#                                change-detection (ETag/Last-Modified/checksum) implemented yet (see DATA_CHECKLIST.md)
#   checkpoint_state            cursor/page/offset/since-date state retained between runs, or "none"
#   rate_limit                  known or self-imposed rate limit, or "none enforced"
#   raw_data_path               where the original unmodified payload is kept on disk, or "not retained"
#   known_limitations           list of concrete caveats
#   priority                    P1 (core) .. P5 (deferred/disabled by policy)
#   responsible_parser          primary source file
#   health_status               healthy | stale | error | unknown | not_applicable


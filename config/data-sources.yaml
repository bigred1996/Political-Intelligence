  # ── Goal 10 (2026-06-22): Canadian News, split into its own connector
  # category ("Canadian News", pipeline/news_feeds.py) distinct from the
  # government-department feeds above (now "Government Publications",
  # pipeline/feeds.py) — mixing actual journalism and gov press releases
  # under one "news" bucket made it impossible to tell which sources were
  # screened for COMMERCIAL reuse versus which only ever got the gov-wide
  # Crown-copyright review. Two real terms-of-use reviews were done this
  # session (fetched and read live, not assumed):
  #
  # - Global News / Corus Entertainment: REJECTED. corusent.com's Terms of Use
  #   ("you may download, print or view individual pages for non-commercial
  #   use only") govern globalnews.ca, and Global News runs a separate paid
  #   "Licensing Requests" page (globalnews.ca/pages/global-news-licensing-requests/)
  #   for any other use. No RSS-specific syndication carve-out exists. The
  #   spec named Global News as a "starting approved" source on the
  #   optimistic assumption RSS implies a syndication licence — that
  #   assumption does not hold once the actual ToU is read.
  # - The Conversation Canada: APPROVED. Confirmed live: every Atom entry
  #   carries a per-item <rights> tag reading "Licensed as Creative Commons –
  #   attribution, no derivatives" (CC BY-ND 4.0), and their own
  #   republishing guidelines (theconversation.com/ca/republishing-guidelines)
  #   say commercial use is fine ("it's OK to put our articles on pages with
  #   ads"; you just "can't sell our material separately"). It is the one
  #   source actually enabled below — full text still stays OFF (see
  #   pipeline/news_feeds.py module docstring: their own guidelines forbid
  #   "systematically republish[ing] all of our articles", which is exactly
  #   what a recurring connector does, and full republication separately
  #   requires a pageview-counter script this connector doesn't embed).
  #
  # The remaining named publishers from Tasks.md's NEWS AND RSS POLICY
  # ("disabled candidates pending terms or licensing review") were NOT
  # individually reviewed this session — each gets its own row below (split
  # out of the single bundled placeholder this registry used to carry) so a
  # future licensing pass can track each negotiation separately, but none are
  # Python objects in pipeline/news_feeds.py — there is no connector to wire
  # until one is actually licensed, exactly like the canlii/scc_official rows.


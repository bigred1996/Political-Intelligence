  # ── Goal 9 (2026-06-22): generic RSS/Atom/RDF government-publication
  # connector. pipeline/feeds.py is ONE parser shared by all 11 entries below
  # (FeedDef registry); pipeline/connectors.py generates one SourceConnector
  # per FeedDef. Of Tasks.md's NEWS AND RSS POLICY pre-approved starting list
  # (PMO, Finance, Bank of Canada, GAC, NRCan, "relevant regulator feeds"),
  # only Finance Canada has no dedicated departmental feed — it has no
  # discoverable RSS/Atom and no working `dept=` slug on the IO News API
  # (tried departmentoffinance/departmentoffinancecanada/financecanada, all
  # 0 results); its releases already flow through the existing `gc_news`
  # connector (entity_name = "Department of Finance Canada", ~117 items in a
  # pick=3000 window) so it is NOT duplicated here. IAAC, OSFI and the
  # Canadian Nuclear Safety Commission were also investigated and have NO
  # working RSS/Atom feed (IAAC: /rss.xml and /eng/rss.xml both return
  # HTTP 200 HTML-404 pages; OSFI: email-only "Subscribe" page, no feed
  # references at all; CNSC: both documented subscribe-rss URLs 404) — left
  # out rather than wired to a guessed/dead URL.
  #
  # LICENSING (commercial_reuse_reviewed for the 8 canada.ca-hosted department
  # feeds below): confirmed via canada.ca/en/transparency/terms.html — "you may
  # reproduce materials... for non-commercial purposes... without charge or
  # further permission"; "you may not reproduce materials for the purposes of
  # commercial redistribution... without prior written permission". Nessus is
  # commercial and holds no such permission, so full_text_storage_allowed is
  # false for ALL 11 sources here regardless of what the feed item itself
  # contains — pipeline/feeds.py never even parses `<content:encoded>`/Atom
  # `<content>` (the full-article fields), and caps the stored/displayed
  # `summary`/`full_text` to a ~320-char publisher-supplied snippet, per
  # Tasks.md's "For unlicensed news and RSS: store only... short
  # publisher-supplied description... do not store or display full
  # copyrighted article text". The complete raw feed XML is still archived via
  # pipeline.raw_storage.save_raw() (category "news-rss") for internal
  # provenance only — not a public display/redistribution surface. Bank of
  # Canada, CRTC and CER publish under their own separate sites/terms (not
  # canada.ca) — their specific terms-of-use pages were NOT individually
  # reviewed this session, so commercial_reuse_reviewed is honestly false for
  # those three even though the same conservative snippet-only handling
  # applies to them too.

